# .github/settings.yml for github/safe-settings action

teams:
  - name: core-devs
    permission: push
    exclude:
      - ".github"
      
repository:
  default_branch: main
  has_issues: true
  has_projects: false
  has_wiki: false
  allow_merge_commit: false
  allow_squash_merge: true
  allow_rebase_merge: false
  allow_auto_merge: true
  delete_branch_on_merge: true
  # gitignore_template: "VisualStudio"
  # license_template: mit
  visibility: public
  topics:
    - dotnet
    - aws
    - serverless
    - layeredcraft
    - open-source

branches:
  - name: main
    protection:
      required_status_checks:
        strict: true
        contexts:
          - build / build
      required_pull_request_reviews:
        dismissal_restrictions: {}
        dismiss_stale_reviews: true
        require_code_owner_reviews: true
        required_approving_review_count: 1
      enforce_admins: false
      restrictions: null
      required_linear_history: true
      required_signatures: false

labels:
  include:
    - name: 🐛 bug
      color: "d73a4a"
      description: "Something isn't working"
    - name: ✨ enhancement
      color: "a2eeef"
      description: "New feature or request"
    - name: 📜 documentation
      color: "0075ca"
      description: "Improvements or additions to documentation"
    - name: 👋 good first issue
      color: "7057ff"
      description: "Good for newcomers"
    - name: 😎 help wanted
      color: "008672"
      description: "Extra attention is needed"
    - name: 🚧 blocked
      color: "e4e669"
      description: "Blocked by another task or issue"
    - name: 💡 idea
      color: "c2e0c6"
      description: "Idea or proposal for future work"
    - name: "type: feat"
      color: "0075ca"
      description: "New feature"
    - name: "type: fix"
      color: "d73a4a"
      description: "Bug fix"
    - name: "type: docs"
      color: "0075ca"
      description: "Documentation change"
    - name: "type: refactor"
      color: "e4e669"
      description: "Code refactoring"
    - name: "type: test"
      color: "bfd4f2"
      description: "Test changes"
    - name: "type: chore"
      color: "fef2c0"
      description: "Maintenance task"
    - name: "type: ci"
      color: "c5def5"
      description: "CI/CD changes"
    - name: "type: revert"
      color: "ee0701"
      description: "Reverts a previous commit"
    - name: "breaking-change"
      color: "b60205"
      description: "Introduces a breaking change"
    - name: "skip-changelog"
      color: "ededed"
      description: "Exclude from release notes"
    - name: "internal"
      color: "ededed"
      description: "Internal change, exclude from release notes"
